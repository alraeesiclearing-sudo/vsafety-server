services:
  - type: web
    name: vehicle-inspection-system
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/trpc/auth.me
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
